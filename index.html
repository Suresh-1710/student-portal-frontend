<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Management</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="navbar">
    <div class="brand">Student Portal</div>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="students">Students</button>
      <button class="tab-btn" data-tab="add-student">Add Student</button>
      <button class="tab-btn" data-tab="attendance">Attendance</button>
    </nav>
  </header>

  <main class="container">

    <div id="toast" class="toast hidden"></div>

    <!-- Students list -->
    <section id="tab-students" class="tab-panel active">
      <div class="panel-header">
        <h2>All Students</h2>
        <div class="search-row">
          <input id="search-name" type="text" placeholder="Search by name…" />
          <button id="btn-search" class="btn btn-secondary">Search</button>
          <button id="btn-clear-search" class="btn btn-ghost">Clear</button>
        </div>
      </div>

      <div id="students-loading" class="skeleton-grid hidden">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>

      <div id="students-error" class="error-banner hidden"></div>
      <div id="students-grid" class="student-grid"></div>
    </section>

    <!-- Add student form -->
    <section id="tab-add-student" class="tab-panel">
      <div class="panel-header">
        <h2>Add New Student</h2>
      </div>

      <form id="add-student-form" class="form-card" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="f-first-name">First Name <span class="req">*</span></label>
            <input id="f-first-name" name="First_Name" type="text" placeholder="First name" required />
          </div>
          <div class="form-group">
            <label for="f-last-name">Last Name <span class="req">*</span></label>
            <input id="f-last-name" name="Last_Name" type="text" placeholder="Last name" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="f-batch">Batch <span class="req">*</span></label>
            <select id="f-batch" name="Batch_ID">
              <option value="">-- Select Batch --</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="f-email">Email Address <span class="req">*</span></label>
            <input id="f-email" name="Email_Address" type="email" placeholder="student@example.com" required />
          </div>
          <div class="form-group">
            <label for="f-phone">Phone Number <span class="req">*</span></label>
            <input id="f-phone" name="Phone_Number" type="tel" placeholder="10-digit number" required />
          </div>
        </div>

        <div id="form-error" class="error-banner hidden"></div>

        <div class="form-actions">
          <button type="submit" id="btn-add" class="btn btn-primary">Add Student</button>
          <button type="reset" class="btn btn-ghost">Reset</button>
        </div>
      </form>
    </section>

    <!-- Attendance summary -->
    <section id="tab-attendance" class="tab-panel">
      <div class="panel-header">
        <h2>Attendance Summary</h2>
        <button id="btn-refresh-attendance" class="btn btn-secondary">Refresh</button>
      </div>

      <div id="attendance-loading" class="skeleton-grid hidden">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>

      <div id="attendance-error" class="error-banner hidden"></div>

      <div id="attendance-table-wrap" class="table-wrap hidden">
        <table id="attendance-table">
          <thead>
            <tr>
              <th>Student ID</th>
              <th>Name</th>
              <th>Total Classes</th>
              <th>Present</th>
              <th>Absent</th>
              <th>Attendance %</th>
            </tr>
          </thead>
          <tbody id="attendance-tbody"></tbody>
        </table>
      </div>

      <p id="attendance-empty" class="empty-state hidden">No attendance records found.</p>
    </section>

  </main>

  
  <script>window.API_BASE = 'https://student-portal-backend-0cvs.onrender.com';</script>
  <script src="script.js"></script>
</body>
</html>
